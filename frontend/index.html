<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coursnote</title>
<link rel="stylesheet" href="assets/styles.css?v=60">
<link rel="stylesheet" href="assets/toolbar.css">
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <h2>Coursnote</h2>
    <p>Your course notes</p>
  </div>
  <div id="sidebar-nav"></div>
  <div id="sidebar-footer"></div>
</nav>

<main id="main"></main>

<div id="toast"></div>
<input type="file" id="nb-image-input" accept="image/*" style="display:none">


<div class="modal-overlay" id="modal-overlay" onmousedown="modalOverlayClick(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-title" id="modal-title"></div>

    <div class="modal-body" id="modal-course">
      <div class="form-row">
        <div class="field"><label>Name</label><input id="cf-name" placeholder="e.g. Data Structures" /></div>
        <div class="field"><label>Description</label><input id="cf-desc" placeholder="What's this course about?" /></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="cf-submit">Create</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
    </div>

    <div class="modal-body" id="modal-module">
      <div class="form-row">
        <div class="field"><label>Name</label><input id="mf-name" placeholder="e.g. Week 3 — Sorting" /></div>
        <div class="field"><label>Description</label><input id="mf-desc" placeholder="Brief overview…" /></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="mf-submit">Create</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
    </div>

    <div class="modal-body" id="modal-topic">
      <div class="form-row">
        <div class="field"><label>Name</label><input id="tf-name" placeholder="e.g. Binary Search Trees" /></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="tf-submit">Create</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
    </div>

    <div class="modal-body" id="modal-versions">
      <div id="modal-versions-list"></div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script>
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
  require(['vs/editor/editor.main'], function() {
    window.dispatchEvent(new Event('monaco-ready'));
  });
</script>
<script type="module" src="/main.js"></script>
<script src="assets/state.js"></script>
<script src="assets/api.js"></script>
<script src="assets/utils.js"></script>
<script src="assets/data.js"></script>
<script src="assets/notebook.js"></script>
<script src="assets/save.js"></script>
<script src="assets/views.js"></script>
<script src="assets/render.js"></script>
<script src="assets/forms.js"></script>
<script src="assets/actions.js"></script>
<script src="assets/navigation.js"></script>
<script src="assets/boot.js"></script>
</body>
</html>
